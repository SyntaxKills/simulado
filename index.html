<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Simulado - Modo Dinâmico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

        <p>Interface Dinâmica conectada ao questions.txt</p>

    <div id="container-erro" style="display: none;"></div>

    <form id="formularioQuiz">

        <button type="button" id="btnProcessar" class="botao-comando" onclick="executarDiagnostico()">Transmitir Respostas para Validação da IA</button>
    </form>

    <div id="statusCarregando" class="status-carregamento">Analisando dados com o motor remoto Gemini... Por favor, aguarde.</div>
    
    <div id="bloco-resultado">
        <h2 class="titulo-resultado">Diagnóstico de Desempenho</h2>
        <div id="respostaIA" class="painel-ia"></div>
    </div>
</div>

<script>
    let bancoQuestoes = [];

    async function carregarQuestoesDoArquivo() {
        const espacoPerguntas = document.getElementById('espaco-perguntas');
        const containerErro = document.getElementById('container-erro');
        
        try {
            const respostaTxt = await fetch('questions.txt');
            if (!respostaTxt.ok) {
                throw new Error('Não foi possível localizar ou ler o arquivo questions.txt na raiz do diretório.');
            }
            
            const textoBruto = await respostaTxt.text();
            const blocos = textoBruto.split(/\n\s*\n/);
            let idQuestao = 1;
            
            blocos.forEach(bloco => {
                const linhas = bloco.trim().split('\n');
                if (linhas.length >= 6) {
                    let enunciado = linhas[0];
                    let altA = linhas[1];
                    let altB = linhas[2];
                    let altC = linhas[3];
                    let altD = líneas[4];
                    let gabarito = linhas[5].replace('Gabarito:', '').trim();
                    
                    bancoQuestoes.push({
                        id: idQuestao,
                        enunciado: enunciado,
                        opcoes: [altA, altB, altC, altD],
                        correta: gabarito
                    });
                    
                    let htmlCard = `
                        <div class="cartao-questao">
                            <span class="num-questao">Instância ${String(idQuestao).padStart(2, '0')}</span>
                            <div class="texto-questao">${enunciado}</div>
                            <ul class="lista-opcoes">
                    `;
                    
                    const letras = ['A', 'B', 'C', 'D'];
                    for (let j = 0; j < 4; j++) {
                        htmlCard += `
                            <li class="opcao-item">
                                <label class="opcao-label">
                                    <input type="radio" name="q${idQuestao}" value="${letras[j]}" class="opcao-input">
                                    ${linhas[j+1]}
                                </label>
                            </li>
                        `;
                    }
                    
                    htmlCard += `</ul></div>`;
                    espacoPerguntas.innerHTML += htmlCard;
                    idQuestao++;
                }
            });
            
        } catch (erro) {
            containerErro.style.display = 'block';
            containerErro.className = 'status-erro';
            containerErro.innerHTML = `Erro de inicialização: ${erro.message}<br>Verifique se o arquivo questions.txt está na mesma pasta da sua página web.`;
        }
    }
